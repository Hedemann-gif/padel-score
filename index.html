
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Scoreboard</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  text-align:center;
}
.container {
  padding:10px;
  max-width:900px;
  margin:auto;
}
button {
  padding:10px;
  margin:4px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.primary { background:#00c853; color:white; }
.warn { background:#ff9800; }
.danger { background:#d50000; color:white; }

button.disabled {
  opacity:.4;
  pointer-events:none;
}

.players button.used { opacity:.4; }

.teams {
  display:flex;
  gap:10px;
  margin-top:10px;
}
.team {
  flex:1;
  background:#111;
  padding:10px;
  border-radius:10px;
}
.score {
  font-size:64px;
  font-weight:bold;
}

.board {
  margin-top:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:left;
}
</style>
</head>

<body>
<div class="container">

<h1>🎾 PADEL SCORE</h1>

<h3>Spillere</h3>
<div id="playerList"></div>

<p>Aktivt hold: <strong id="activeTeam">A</strong></p>
<button onclick="setActiveTeam('A')">Hold A</button>
<button onclick="setActiveTeam('B')">Hold B</button>

<br><br>
<button class="primary" id="startBtn" onclick="startMatch()">START KAMP</button>

<div class="teams">

<div class="team">
  <h2>Hold A</h2>
  <div id="namesA"></div>
  <div class="score" id="pointsA">0</div>
  Partier: <span id="gamesA">0</span><br>
  <button class="primary disabled" id="addA" onclick="addPoint('A')">+ Point</button>
  <button class="warn disabled" id="undoA" onclick="undoPoint()">−</button>
</div>

<div class="team">
  <h2>Hold B</h2>
  <div id="namesB"></div>
  <div class="score" id="pointsB">0</div>
  Partier: <span id="gamesB">0</span><br>
  <button class="primary disabled" id="addB" onclick="addPoint('B')">+ Point</button>
  <button class="warn disabled" id="undoB" onclick="undoPoint()">−</button>
</div>

</div>

<br>
<button class="primary" onclick="endMatch()">AFSLUT KAMP</button>

<div class="board">
  <h3>📋 Kampe</h3>
  <div id="matchBoard"></div>
</div>

<div class="board">
  <h3>🏆 Spillerstatistik</h3>
  <div id="playerStats"></div>
</div>

<br>
<button class="danger" onclick="newMatch()">NY KAMP</button>
<button class="danger" onclick="clearAll()">RYD AL DATA</button>

</div>

<script>
const STORAGE_KEY = "padelFast";
const scoreSteps = [0,15,30,40,"AD"];
const players = ["Mads","Jonas","Peter","Martin","Madsen"];

let state = {
  activeTeam:"A",
  teamA:[],
  teamB:[],
  indexA:0,
  indexB:0,
  gamesA:0,
  gamesB:0,
  started:false,
  history:[],
  stats:{},
  undo:[]
};

players.forEach(p => state.stats[p] = {win:0, lose:0});

const el = id => document.getElementById(id);

/* ---------- STORAGE ---------- */
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){
  const s = localStorage.getItem(STORAGE_KEY);
  if(s) state = JSON.parse(s);
}

/* ---------- HOLD ---------- */
function setActiveTeam(t){ state.activeTeam = t; render(); }

function addPlayer(p){
  if(state.started) return;
  if(state.teamA.includes(p)||state.teamB.includes(p)) return;

  if(state.activeTeam==="A" && state.teamA.length<2) state.teamA.push(p);
  if(state.activeTeam==="B" && state.teamB.length<2) state.teamB.push(p);
  render();
}

function startMatch(){
  if(state.teamA.length!==2||state.teamB.length!==2)
    return alert("Vælg 2 spillere pr. hold");
  state.started = true;
  render();
}

/* ---------- PERFORMANCE-UNDO (KUN DET NØDVENDIGE) ---------- */
function pushUndo(){
  state.undo.push({
    indexA: state.indexA,
    indexB: state.indexB,
    gamesA: state.gamesA,
    gamesB: state.gamesB
  });
  if(state.undo.length > 50) state.undo.shift();
}

function undoPoint(){
  if(!state.undo.length) return;
  const u = state.undo.pop();
  state.indexA = u.indexA;
  state.indexB = u.indexB;
  state.gamesA = u.gamesA;
  state.gamesB = u.gamesB;
  render();
}

/* ---------- SCORE ---------- */
function addPoint(t){
  if(!state.started) return;
  pushUndo();

  if(state.indexA===3 && state.indexB===3){
    t==="A"?state.indexA=4:state.indexB=4;
  }
  else if(state.indexA===4){
    t==="A"?win("A"):resetDeuce();
  }
  else if(state.indexB===4){
    t==="B"?win("B"):resetDeuce();
  }
  else{
    t==="A"?state.indexA++:state.indexB++;
    if(state.indexA===4 && state.indexB<3) win("A");
    if(state.indexB===4 && state.indexA<3) win("B");
  }
  render();
}

function resetDeuce(){ state.indexA=3; state.indexB=3; }

function win(t){
  t==="A"?state.gamesA++:state.gamesB++;
  state.indexA=state.indexB=0;
}

/* ---------- KAMP ---------- */
function endMatch(){
  if(!state.started) return;
  state.started=false;

  state.history.push({
    a:state.teamA.join(" / "),
    b:state.teamB.join(" / "),
    sa:state.gamesA,
    sb:state.gamesB
  });

  const winners = state.gamesA > state.gamesB ? state.teamA : state.teamB;
  const losers  = state.gamesA > state.gamesB ? state.teamB : state.teamA;
  winners.forEach(p=>state.stats[p].win++);
  losers.forEach(p=>state.stats[p].lose++);
  render();
}

function newMatch(){
  state.teamA=[];
  state.teamB=[];
  state.indexA=state.indexB=state.gamesA=state.gamesB=0;
  state.started=false;
  state.undo=[];
  render();
}

function clearAll(){
  if(!confirm("Slet ALT data?")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

/* ---------- RENDER ---------- */
function render(){
  el("activeTeam").innerText = state.activeTeam;
  el("namesA").innerText = state.teamA.join(" / ");
  el("namesB").innerText = state.teamB.join(" / ");
  el("pointsA").innerText = scoreSteps[state.indexA];
  el("pointsB").innerText = scoreSteps[state.indexB];
  el("gamesA").innerText = state.gamesA;
  el("gamesB").innerText = state.gamesB;

  el("playerList").innerHTML = players.map(p =>
    `<button class="${state.teamA.includes(p)||state.teamB.includes(p)?'used':''}"
     onclick="addPlayer('${p}')">${p}</button>`).join("");

  ["addA","addB","undoA","undoB"].forEach(id=>{
    el(id).classList.toggle("disabled", !state.started);
  });
  el("startBtn").classList.toggle("disabled", state.started);

  el("matchBoard").innerHTML = state.history.slice().reverse()
    .map(m=>`<div>${m.a} ${m.sa} – ${m.sb} ${m.b}</div>`).join("");

  el("playerStats").innerHTML =
    players.map(p=>`${p}: ${state.stats[p].win} v / ${state.stats[p].lose} t<br>`).join("");

  save();
}

load();
render();
</script>
</body>
</html>
