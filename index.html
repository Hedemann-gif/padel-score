<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Scoreboard</title>

  manifest.json
  <meta name="theme-color" content="#000">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
    }

    .container {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .players {
      text-align: center;
    }

    .players button {
      margin: 5px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      background: #444;
      color: white;
    }

    .players button.used {
      background: #222;
      opacity: 0.4;
    }

    .team-select button {
      margin: 5px;
      padding: 10px;
      font-size: 18px;
    }

    .teams {
      display: flex;
      gap: 10px;
    }

    .team {
      flex: 1;
      background: #111;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
    }

    .names {
      font-size: 22px;
      min-height: 50px;
      opacity: 0.8;
    }

    .score {
      font-size: 14vw;
      font-weight: bold;
    }

    .games {
      font-size: 24px;
    }

    button.action {
      width: 100%;
      font-size: 24px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #00c853;
      color: white;
    }

    .reset {
      background: #d50000;
    }
  </style>
</head>

<body>

<h1>🎾 PADEL SCORE</h1>

<div class="container">

  <!-- FAST SPILLERLISTE -->
  <div class="players">
    <h3>Spillere</h3>
    <div id="playerList"></div>
  </div>

  <!-- VÆLG AKTIVT HOLD -->
  <div class="team-select" style="text-align:center;">
    <button onclick="setActiveTeam('A')">Vælg Hold A</button>
    <button onclick="setActiveTeam('B')">Vælg Hold B</button>
    <p>Aktivt hold: <strong id="activeTeam">A</strong></p>
  </div>

  <!-- SCORE -->
  <div class="teams">

    <div class="team">
      <h2>HOLD A</h2>
      <div class="names" id="namesA"></div>
      <div class="score" id="pointsA">0</div>
      <div class="games">Partier: <span id="gamesA">0</span></div>
      <button class="action" onclick="point('A')">+ POINT</button>
    </div>

    <div class="team">
      <h2>HOLD B</h2>
      <div class="names" id="namesB"></div>
      <div class="score" id="pointsB">0</div>
      <div class="games">Partier: <span id="gamesB">0</span></div>
      <button class="action" onclick="point('B')">+ POINT</button>
    </div>

  </div>

  <button class="action reset" onclick="newMatch()">NY KAMP</button>

</div>

<script>
  /* ---------- FASTE SPILLERE ---------- */
  const players = ["Mads", "Jonas", "Peter", "Martin", "Madsen"];
  let activeTeam = "A";

  let teamA = [];
  let teamB = [];

  /* ---------- SCORE ---------- */
  const scoreSteps = [0, 15, 30, 40, "AD"];
  let indexA = 0, indexB = 0;
  let gamesA = 0, gamesB = 0;

  function setActiveTeam(t) {
    activeTeam = t;
    activeTeamEl.innerText = t;
  }

  function addPlayer(name) {
    if (teamA.includes(name) || teamB.includes(name)) return;

    if (activeTeam === "A") {
      if (teamA.length === 2) return alert("Hold A er fuldt");
      teamA.push(name);
    } else {
      if (teamB.length === 2) return alert("Hold B er fuldt");
      teamB.push(name);
    }
    save();
    render();
  }

  function renderPlayers() {
    playerList.innerHTML = "";
    players.forEach(p => {
      const b = document.createElement("button");
      b.textContent = p;
      if (teamA.includes(p) || teamB.includes(p)) b.classList.add("used");
      b.onclick = () => addPlayer(p);
      playerList.appendChild(b);
    });
  }

  function render() {
    namesA.innerText = teamA.join(" / ");
    namesB.innerText = teamB.join(" / ");
    pointsA.innerText = scoreSteps[indexA];
    pointsB.innerText = scoreSteps[indexB];
    gamesAEl.innerText = gamesA;
    gamesBEl.innerText = gamesB;
    renderPlayers();
  }

  /* ---------- SCORE LOGIK (AD) ---------- */
  function point(t) {
    if (indexA === 3 && indexB === 3) {
      t === "A" ? indexA = 4 : indexB = 4;
      return render();
    }

    if (indexA === 4) return t === "A" ? win("A") : resetDeuce();
    if (indexB === 4) return t === "B" ? win("B") : resetDeuce();

    t === "A" ? indexA++ : indexB++;
    if (indexA === 4 && indexB < 3) return win("A");
    if (indexB === 4 && indexA < 3) return win("B");
    render();
  }

  function resetDeuce() {
    indexA = indexB = 3;
    render();
  }

  function win(t) {
    t === "A" ? gamesA++ : gamesB++;
    indexA = indexB = 0;
    save();
    render();
  }

  /* ---------- GEM / NY KAMP ---------- */
  function save() {
    localStorage.setItem("padel", JSON.stringify({teamA,teamB,indexA,indexB,gamesA,gamesB}));
  }

  function load() {
    const d = JSON.parse(localStorage.getItem("padel"));
    if (!d) return;
    ({teamA,teamB,indexA,indexB,gamesA,gamesB} = d);
  }

  function newMatch() {
    if (!confirm("Nulstil kamp og hold?")) return;
    teamA = []; teamB = [];
    indexA = indexB = gamesA = gamesB = 0;
    localStorage.removeItem("padel");
    render();
  }

  load();
  render();
</script>

</body>
</html>
``
