<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Scoreboard</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 { margin: 10px 0; }

    .container {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .players button {
      margin: 5px;
      padding: 10px 16px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #444;
      color: white;
    }

    .players button.used {
      opacity: 0.4;
      background: #222;
    }

    .team-select button {
      margin: 5px;
      padding: 10px;
      font-size: 18px;
    }

    .teams {
      display: flex;
      gap: 10px;
    }

    .team {
      flex: 1;
      background: #111;
      border-radius: 15px;
      padding: 10px;
    }

    .names {
      font-size: 20px;
      opacity: 0.8;
      min-height: 30px;
    }

    .score {
      font-size: 80px;
      font-weight: bold;
    }

    .games {
      font-size: 20px;
    }

    .action {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      font-size: 22px;
      border-radius: 12px;
      border: none;
      background: #00c853;
      color: white;
    }

    .reset {
      background: #d50000;
    }
  </style>
</head>

<body>

<h1>🎾 PADEL SCORE</h1>

<div class="container">

  <!-- SPILLERLISTE -->
  <div class="players">
    <h3>Spillere (klik for at tilføje)</h3>
    <div id="playerList"></div>
  </div>

  <!-- VÆLG HOLD -->
  <div class="team-select">
    <button onclick="setActiveTeam('A')">Vælg Hold A</button>
    <button onclick="setActiveTeam('B')">Vælg Hold B</button>
    <p>Aktivt hold: <strong id="activeTeamText">A</strong></p>
  </div>

  <!-- HOLD -->
  <div class="teams">

    <div class="team">
      <h2>Hold A</h2>
      <div class="names" id="namesA"></div>
      <div class="score" id="pointsA">0</div>
      <div class="games">Partier: <span id="gamesA">0</span></div>
      <button class="action" onclick="point('A')">+ POINT</button>
    </div>

    <div class="team">
      <h2>Hold B</h2>
      <div class="names" id="namesB"></div>
      <div class="score" id="pointsB">0</div>
      <div class="games">Partier: <span id="gamesB">0</span></div>
      <button class="action" onclick="point('B')">+ POINT</button>
    </div>

  </div>

  <button class="action reset" onclick="newMatch()">NY KAMP</button>

</div>

<script>
  /* ---------- FASTE SPILLERE ---------- */
  const players = ["Mads", "Jonas", "Peter", "Martin", "Madsen"];

  let activeTeam = "A";
  let teamA = [];
  let teamB = [];

  /* ---------- SCORE ---------- */
  const scoreSteps = [0, 15, 30, 40, "AD"];
  let indexA = 0, indexB = 0;
  let gamesA = 0, gamesB = 0;

  const playerList = document.getElementById("playerList");
  const namesA = document.getElementById("namesA");
  const namesB = document.getElementById("namesB");
  const pointsA = document.getElementById("pointsA");
  const pointsB = document.getElementById("pointsB");
  const gamesAEl = document.getElementById("gamesA");
  const gamesBEl = document.getElementById("gamesB");
  const activeTeamText = document.getElementById("activeTeamText");

  function setActiveTeam(team) {
    activeTeam = team;
    activeTeamText.textContent = team;
  }

  function addPlayer(name) {
    if (teamA.includes(name) || teamB.includes(name)) return;

    if (activeTeam === "A") {
      if (teamA.length === 2) return alert("Hold A er fuldt");
      teamA.push(name);
    } else {
      if (teamB.length === 2) return alert("Hold B er fuldt");
      teamB.push(name);
    }
    render();
  }

  function renderPlayers() {
    playerList.innerHTML = "";
    players.forEach(p => {
      const btn = document.createElement("button");
      btn.textContent = p;
      if (teamA.includes(p) || teamB.includes(p)) btn.classList.add("used");
      btn.onclick = () => addPlayer(p);
      playerList.appendChild(btn);
    });
  }

  function render() {
    namesA.textContent = teamA.join(" / ");
    namesB.textContent = teamB.join(" / ");
    pointsA.textContent = scoreSteps[indexA];
    pointsB.textContent = scoreSteps[indexB];
    gamesAEl.textContent = gamesA;
    gamesBEl.textContent = gamesB;
    renderPlayers();
  }

  /* ---------- SCORE LOGIK (AD) ---------- */
  function point(team) {
    if (indexA === 3 && indexB === 3) {
      team === "A" ? indexA = 4 : indexB = 4;
      return render();
    }

    if (indexA === 4) return team === "A" ? win("A") : resetDeuce();
    if (indexB === 4) return team === "B" ? win("B") : resetDeuce();

    team === "A" ? indexA++ : indexB++;
    if (indexA === 4 && indexB < 3) return win("A");
    if (indexB === 4 && indexA < 3) return win("B");

    render();
  }

  function resetDeuce() {
    indexA = indexB = 3;
    render();
  }

  function win(team) {
    team === "A" ? gamesA++ : gamesB++;
    indexA = indexB = 0;
    render();
  }

  function newMatch() {
    if (!confirm("Nulstil kamp og hold?")) return;
    teamA = [];
    teamB = [];
    indexA = indexB = gamesA = gamesB = 0;
    render();
  }

  /* ---------- INIT ---------- */
  render();
</script>

</body>
</html>
